name: Build app

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: Android
            os: ubuntu-latest
            cmd: flutter build apk --release
            out: build/app/outputs/flutter-apk/app-release.apk

          - target: Linux
            os: ubuntu-latest
            cmd: flutter build linux --release
            out: build/linux/x64/release/bundle

          - target: Windows
            os: windows-latest
            cmd: flutter build windows --release
            out: build/windows/x64/runner/Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Linux build tools
        if: matrix.target == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build ${{ matrix.target }}
        run: ${{ matrix.cmd }}

      - name: Upload ${{ matrix.target }} App
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-App
          path: ${{ matrix.out }}
          retention-days: 7
